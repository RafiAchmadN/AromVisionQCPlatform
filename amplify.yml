version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
        - mkdir -p public/models
        - cp yolo_service/models/best.onnx public/models/best.onnx
        - cp node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.wasm public/
        - cp node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.mjs public/
        - cp node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.asyncify.wasm public/
        - cp node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.asyncify.mjs public/
    build:
      commands:
        - echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env.production
        - echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.production
        - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - echo "GROQ_API_KEY=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" >> .env.production
        - echo "NEXT_PUBLIC_GROQ_API_KEY=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" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
